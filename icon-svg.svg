<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7000ff; stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100" height="100" fill="#050508" rx="20"/>

  <polygon points="50,15 85,35 85,65 50,85 15,65 15,35" fill="rgba(0, 229, 255, 0.1)" stroke="url(#neonGradient)" stroke-width="5" filter="url(#glow)"/>

  <text x="50" y="63" font-family="'Courier New', monospace" font-size="34" font-weight="900" fill="#00e5ff" text-anchor="middle" filter="url(#glow)">SC</text>
</svg>
